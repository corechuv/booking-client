<!doctype html>
<html lang="ru-RU" translate="yes">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="content-language" content="ru" />
    <script>
      ;(() => {
        document.documentElement.setAttribute('lang', 'ru-RU')
        document.documentElement.setAttribute('xml:lang', 'ru-RU')
        document.documentElement.setAttribute('translate', 'yes')
        const meta = document.querySelector('meta[name="content-language"]')
        if (meta) {
          meta.setAttribute('content', 'ru')
        }
      })()
    </script>
    <title>mira-booking</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
